<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkedIn API Tester</title>

    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="container">

    <h2>LinkedIn API Tester</h2>

    <label for="description">Description</label>
    <textarea
        id="description"
        rows="6"
        placeholder="Describe your LinkedIn post..."
    ></textarea>

    <button id="generateBtn">
        Generate Post
    </button>

    <button
        id="connectBtn"
    >
        Connect LinkedIn
    </button>

    <h3>Generated Post</h3>

    <textarea
        id="postText"
        rows="10"
        readonly
    ></textarea>

    <div id="publishArea" style="display:none;">

        <label for="image">
            Image (Optional)
        </label>

        <input
            type="file"
            id="image"
            accept="image/*"
        >

        <button id="publishBtn">
            Confirm & Publish
        </button>

    </div>

    <div id="status"></div>

</div>

<script src="/static/script.js"></script>

</body>
</html>
