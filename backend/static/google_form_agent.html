<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Forms Agent</title>

    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            background:#f4f4f4;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .container{
            width:500px;
            background:white;
            padding:25px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,.2);
        }

        h2{
            text-align:center;
        }

        textarea{
            width:100%;
            height:120px;
            margin-top:15px;
            padding:10px;
            resize:none;
            font-size:15px;
        }

        button{
            width:100%;
            padding:12px;
            margin-top:15px;
            border:none;
            border-radius:5px;
            cursor:pointer;
            font-size:16px;
        }

        #connect{
            background:#4285F4;
            color:white;
        }

        #create{
            background:#34A853;
            color:white;
        }

        pre{
            margin-top:20px;
            background:#eee;
            padding:10px;
            border-radius:5px;
            overflow:auto;
        }
    </style>
</head>
<body>

<div class="container">

    <h2>Google Forms Agent</h2>

    <button id="connect">
        Connect Google Account
    </button>

    <textarea
        id="description"
        placeholder="Describe the Google Form you want...">
    </textarea>

    <button id="create">
        Create Google Form
    </button>

    <pre id="output"></pre>

</div>

<script>

const API = "http://localhost:8000";

document
.getElementById("connect")
.onclick = () => {

    window.location.href =
        API + "/auth/google/connect";

};


document
.getElementById("create")
.onclick = async () => {

    const description =
        document.getElementById("description").value;

    const res = await fetch(
        API + "/create_google_form",
        {
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                description:description
            }),
            credentials:"include"
        }
    );

    if(res.redirected){
        window.location.href = res.url;
        return;
    }

    const data = await res.json();

    document.getElementById("output").textContent =
        JSON.stringify(data,null,4);

};

</script>

</body>
</html>
