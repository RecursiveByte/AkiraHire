<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Google OAuth Test</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .container {
      width: 100%;
      max-width: 480px;
    }

    h1 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 1.5rem;
      color: #1a1a1a;
    }

    .card {
      background: #fff;
      border: 1px solid #e5e5e5;
      border-radius: 12px;
      padding: 1.25rem;
      margin-bottom: 1rem;
      transition: opacity 0.2s;
    }

    .card.disabled {
      opacity: 0.4;
      pointer-events: none;
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 1rem;
    }

    .step-badge {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: #e8f0fe;
      color: #1a73e8;
      font-size: 12px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .card-header h2 {
      font-size: 15px;
      font-weight: 600;
      color: #1a1a1a;
    }

    .field {
      margin-bottom: 10px;
    }

    .field label {
      display: block;
      font-size: 12px;
      color: #666;
      margin-bottom: 4px;
    }

    input[type="text"],
    input[type="email"],
    input[type="password"],
    select {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      color: #1a1a1a;
      outline: none;
      transition: border-color 0.15s;
      background: #fff;
    }

    input:focus, select:focus {
      border-color: #1a73e8;
    }

    button {
      width: 100%;
      padding: 9px 16px;
      background: #1a73e8;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 4px;
    }

    button:hover { background: #1558b0; }
    button:active { background: #0f3f80; }

    .status {
      font-size: 13px;
      margin-top: 10px;
      padding: 8px 12px;
      border-radius: 8px;
      display: none;
    }

    .status.success {
      background: #e6f4ea;
      color: #1e7e34;
      display: block;
    }

    .status.error {
      background: #fce8e6;
      color: #c5221f;
      display: block;
    }

    .status.info {
      background: #e8f0fe;
      color: #1a73e8;
      display: block;
    }

    .token-preview {
      margin-top: 8px;
      font-family: monospace;
      font-size: 11px;
      color: #999;
      word-break: break-all;
      max-height: 40px;
      overflow: hidden;
    }

    .hint {
      font-size: 12px;
      color: #888;
      margin-bottom: 12px;
      line-height: 1.5;
    }

    .form-result a {
      color: #1a73e8;
      font-size: 13px;
      display: block;
      margin-top: 4px;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <div class="container">

    <h1>Google OAuth — test flow</h1>

    <div class="card" id="step1-card">
      <div class="card-header">
        <div class="step-badge">1</div>
        <h2>Login to your app</h2>
      </div>
      <div class="field">
        <label>Base URL</label>
        <input type="text" id="base-url" value="http://localhost:8000" />
      </div>
      <div class="field">
        <label>Login endpoint path</label>
        <input type="text" id="login-path" value="/auth/login" />
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="recruiter@example.com" />
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="••••••••" />
      </div>
      <div class="field">
        <label>Role</label>
        <select id="login-role">
          <option value="RECRUITER">Recruiter</option>
          <option value="CANDIDATE">Candidate</option>
          <option value="ADMIN">Admin</option>
        </select>
      </div>
      <button onclick="doLogin()">Login</button>
      <div class="status" id="login-status"></div>
      <div class="token-preview" id="token-preview"></div>
    </div>

    <div class="card disabled" id="step2-card">
      <div class="card-header">
        <div class="step-badge">2</div>
        <h2>Connect Google account</h2>
      </div>
      <p class="hint">
        This opens a new tab. Pick your Gmail account, click Allow,
        then come back here. Your tokens will be saved in the DB automatically.
      </p>
      <button onclick="connectGoogle()">Open Google consent screen</button>
      <div class="status" id="google-status"></div>
    </div>

    <div class="card disabled" id="step3-card">
      <div class="card-header">
        <div class="step-badge">3</div>
        <h2>Create a Google Form</h2>
      </div>
      <div class="field">
        <label>Form description</label>
        <input
          type="text"
          id="form-desc"
          placeholder="A job application form for a backend engineer role"
        />
      </div>
      <button onclick="createForm()">Create form</button>
      <div class="status" id="form-status"></div>
      <div class="form-result" id="form-result"></div>
    </div>

  </div>

  <script>
    let jwtToken = null;

    function baseUrl() {
      return document.getElementById('base-url').value.trim().replace(/\/$/, '');
    }

    function loginPath() {
      return document.getElementById('login-path').value.trim();
    }

    function setStatus(id, msg, type) {
      const el = document.getElementById(id);
      el.textContent = msg;
      el.className = 'status ' + type;
    }

    function enableCard(id) {
      document.getElementById(id).classList.remove('disabled');
    }

    async function doLogin() {
      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      const role = document.getElementById('login-role').value;

      if (!email || !password) {
        setStatus('login-status', 'Enter email and password.', 'error');
        return;
      }

      setStatus('login-status', 'Logging in...', 'info');

      try {
        const res = await fetch(baseUrl() + loginPath(), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password, role }),
        });

        const data = await res.json();

        if (!res.ok) {
          setStatus('login-status', data.detail || 'Login failed.', 'error');
          return;
        }

        jwtToken = data.access_token;
        setStatus('login-status', 'Logged in. JWT saved in memory.', 'success');
        document.getElementById('token-preview').textContent = jwtToken.slice(0, 80) + '...';
        enableCard('step2-card');
        enableCard('step3-card');

      } catch (e) {
        setStatus('login-status', 'Could not reach server. Is it running?', 'error');
      }
    }

    function connectGoogle() {
      if (!jwtToken) {
        setStatus('google-status', 'Login first.', 'error');
        return;
      }

      const url = baseUrl() + '/auth/google/connect';
      window.open(url, '_blank');
      setStatus('google-status', 'Tab opened. After allowing access, come back and create a form.', 'success');
    }

    async function createForm() {
      const desc = document.getElementById('form-desc').value.trim();

      if (!desc) {
        setStatus('form-status', 'Enter a form description.', 'error');
        return;
      }

      if (!jwtToken) {
        setStatus('form-status', 'Login first.', 'error');
        return;
      }

      setStatus('form-status', 'Creating form...', 'info');
      document.getElementById('form-result').innerHTML = '';

      try {
        const res = await fetch(baseUrl() + '/create_google_form', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + jwtToken,
          },
          body: JSON.stringify({ description: desc }),
        });

        const data = await res.json();

        if (!res.ok) {
          setStatus('form-status', data.detail || 'Form creation failed.', 'error');
          return;
        }

        setStatus('form-status', 'Form created successfully.', 'success');
        document.getElementById('form-result').innerHTML =
          '<a href="' + data.form_edit_url + '" target="_blank">Edit form</a>' +
          '<a href="' + data.form_responder_url + '" target="_blank">Responder link</a>' +
          (data.response_sheet_url ? '<a href="' + data.response_sheet_url + '" target="_blank">Response sheet</a>' : '');

      } catch (e) {
        setStatus('form-status', 'Could not reach server.', 'error');
      }
    }
  </script>
</body>
</html>
